name: tests

# Safety net for the core pure logic (field matching, product/dose/work-type
# matching, the план-агро-работ guard). Runs on every push and PR. No DB or
# external services needed — the tests are pure-logic (see tests/conftest.py).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest
