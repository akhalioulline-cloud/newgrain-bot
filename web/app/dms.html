<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FLAGLEAF — Команда</title>
<meta name="description" content="Личные сообщения между агрономами команды Flagleaf.">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<meta name="apple-mobile-web-app-title" content="Flagleaf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#b9994b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#b9994b; --ink:#1a1a1a; --bg:#faf8f4; --muted:#8a8a8a; --line:#e7e2d8; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:Roboto,-apple-system,Segoe UI,sans-serif;color:var(--ink);background:var(--bg);
       display:flex;flex-direction:column;min-height:100dvh}
  header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;padding-top:env(safe-area-inset-top)}
  .hrow{display:flex;align-items:center;gap:10px;padding:12px 16px}
  .navb{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:17px;line-height:1;color:var(--ink);cursor:pointer;padding:0}
  .logo{font-family:Oswald;font-weight:600;letter-spacing:.14em;font-size:18px}
  .logo b{color:var(--gold)}
  .sub{font-size:12px;color:var(--muted);margin-left:auto;text-align:right}
  .sub .who{color:var(--ink);font-weight:500}
  .logout{color:var(--gold);cursor:pointer;background:none;border:none;font:inherit;padding:0}
  .tabs{display:flex;border-top:1px solid var(--line)}
  .tab{flex:1;text-align:center;padding:10px 5px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.on{color:var(--ink);border-bottom-color:var(--gold)}

  main{flex:1;min-height:0;overflow-y:auto;width:100%;max-width:760px;margin:0 auto;padding:8px 12px;display:flex;flex-direction:column;gap:7px;
       background-image:url('/app/leafbg.png');background-repeat:repeat}
  /* peer list */
  .peer{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 12px;cursor:pointer}
  .pav{width:44px;height:44px;border-radius:50%;background:#efe7d2;color:#6b541f;display:flex;align-items:center;justify-content:center;font-weight:600;flex:none}
  .pname{font-weight:500}
  .ppreview{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:56vw}
  .peer.hot .ppreview{color:var(--ink);font-weight:600}
  .pright{margin-left:auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .ptime{font-size:11.5px;color:var(--muted)}
  .peer.hot .ptime{color:var(--gold);font-weight:600}
  .badge{min-width:20px;height:20px;border-radius:10px;background:var(--gold);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px}
  /* thread */
  .msg{max-width:84%;border-radius:16px;padding:8px 12px;font-size:14.5px;line-height:1.45}
  .theirs{align-self:flex-start;background:#fff;border:1px solid var(--line)}
  .mine{align-self:flex-end;background:var(--ink);color:#fff}
  .mb{white-space:pre-wrap;word-wrap:break-word}
  .mt{font-size:10.5px;margin-top:3px;text-align:right;color:var(--muted);display:flex;gap:4px;justify-content:flex-end;align-items:center}
  .mine .mt{color:rgba(255,255,255,.55)}
  .tick.read{color:var(--gold)}
  .daysep{text-align:center;color:var(--muted);font-size:12px;padding:6px 0}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:24px 12px;line-height:1.5}
  /* composer */
  form{display:none;gap:6px;padding:10px 12px;border-top:1px solid var(--line);background:#fff;max-width:760px;width:100%;margin:0 auto}
  input#q{flex:1;font:inherit;font-size:16px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;outline:none}
  input#q:focus{border-color:var(--gold)}
  .send{background:var(--gold);border:1px solid var(--gold);color:#fff;font-weight:600;width:52px;border-radius:12px;font-size:18px;cursor:pointer}
  .send:disabled{opacity:.5}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <button class="navb" id="navBack" title="Назад">‹</button>
    <span class="logo">FLAG<b>LEAF</b></span>
    <span class="sub"><span class="who" id="hdrWho"></span> · <button class="logout" id="lo">выйти</button></span>
  </div>
  <nav class="tabs">
    <a class="tab" href="/app/feed.html">👥 Лента</a>
    <a class="tab on" href="/app/dms.html">💬 Команда</a>
    <a class="tab" href="/app/assistant.html">🌿 Flagleaf</a>
  </nav>
</header>

<main id="view"><div class="empty">Загружаю…</div></main>
<form id="form">
  <input id="q" placeholder="Сообщение…" autocomplete="off">
  <button type="submit" class="send" id="send">➤</button>
</form>

<script>
const TOK='flagleaf_session', $=id=>document.getElementById(id);
let session=localStorage.getItem(TOK)||'', ME=null, peer=null, pollTimer=null;

async function api(path,opts={}){
  const headers=opts.headers||{}; if(session) headers['x-session']=session;
  const r=await fetch(path,{...opts,headers}); let b=null; try{b=await r.json();}catch(e){}
  if(!r.ok){const err=new Error((b&&b.detail)||('Ошибка '+r.status));err.status=r.status;throw err;} return b;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function initials(n){ return (n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function when(iso){ if(!iso) return ''; const d=new Date(iso), n=new Date();
  const t=d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return d.toDateString()===n.toDateString()?t:(d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})+' '+t); }
function dayLabel(iso){ const d=new Date(iso), n=new Date();
  if(d.toDateString()===n.toDateString()) return 'сегодня';
  const y=new Date(n); y.setDate(n.getDate()-1); if(d.toDateString()===y.toDateString()) return 'вчера';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'}); }

// ---------- peer list ----------
async function showList(){
  peer=null; $('form').style.display='none';
  let d; try{ d=await api('/api/chats'); }catch(e){ if(e.status===401){ location.replace('/app/'); return; } return; }
  const el=$('view'); el.innerHTML='';
  const peers=d.peers||[];
  if(!peers.length){ el.innerHTML='<div class="empty">В команде пока никого, кроме вас.</div>'; return; }
  peers.forEach(p=>{
    const row=document.createElement('div'); row.className='peer'+(p.unread?' hot':''); row.onclick=()=>openThread(p);
    row.innerHTML=`<div class="pav">${esc(initials(p.name))}</div>`+
      `<div><div class="pname">${esc(p.name)}</div><div class="ppreview">${esc(p.last_body?((p.last_mine?'Вы: ':'')+p.last_body):(p.role==='admin'?'руководитель':'агроном'))}</div></div>`+
      `<div class="pright">${p.last_at?`<span class="ptime">${esc(when(p.last_at))}</span>`:''}${p.unread?`<span class="badge">${p.unread}</span>`:''}</div>`;
    el.appendChild(row);
  });
}
// ---------- thread ----------
async function openThread(p){
  peer=p; $('form').style.display='flex'; $('q').focus();
  await loadThread(true);
}
async function loadThread(toBottom){
  if(!peer) return;
  let d; try{ d=await api('/api/dm/with/'+peer.id); }catch(e){ return; }
  const el=$('view'); const prev=el.scrollTop;
  el.innerHTML='';
  const back=document.createElement('div'); back.className='peer'; back.style.cursor='pointer';
  back.innerHTML=`<div class="pav">${esc(initials(peer.name))}</div><div class="pname">${esc(peer.name)}</div><div class="pright"><span class="ptime">‹ к списку</span></div>`;
  back.onclick=()=>showList();
  el.appendChild(back);
  const ms=d.messages||[];
  if(!ms.length){ const e=document.createElement('div'); e.className='empty'; e.textContent=`Личная переписка с ${peer.name}. Видите только вы двое.`; el.appendChild(e); }
  let prevDay='';
  ms.forEach(m=>{
    const lbl=dayLabel(m.created_at);
    if(lbl!==prevDay){ const s=document.createElement('div'); s.className='daysep'; s.textContent=lbl; el.appendChild(s); prevDay=lbl; }
    const div=document.createElement('div'); div.className='msg '+(m.mine?'mine':'theirs');
    const tick=m.mine?`<span class="tick${m.read?' read':''}">${m.read?'✓✓':(m.delivered?'✓✓':'✓')}</span>`:'';
    div.innerHTML=`<div class="mb">${esc(m.body)}</div><div class="mt">${esc(when(m.created_at))}${tick}</div>`;
    el.appendChild(div);
  });
  el.scrollTop = toBottom ? el.scrollHeight : prev;
}
$('form').addEventListener('submit', async e=>{
  e.preventDefault();
  const v=$('q').value.trim(); if(!v||!peer) return;
  $('q').value=''; $('send').disabled=true;
  try{ await api('/api/dm/with/'+peer.id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({body:v})});
       await loadThread(true); }
  catch(err){ alert(err.message||'Не отправилось.'); }
  finally{ $('send').disabled=false; }
});

// ---------- boot + poll ----------
$('navBack').onclick=()=>{ if(peer) showList(); else window.history.back(); };
async function boot(){
  if(!session){ location.replace('/app/'); return; }
  let me=null; try{ me=await api('/api/me'); }catch(e){}
  if(!me){ localStorage.removeItem(TOK); location.replace('/app/'); return; }
  ME=me; $('hdrWho').textContent=me.name||'';
  $('lo').onclick=()=>{ localStorage.removeItem(TOK); location.replace('/app/'); };
  await showList();
  pollTimer=setInterval(()=>{ if(peer) loadThread(false); else showList(); }, 6000);
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible'){ if(peer) loadThread(false); else showList(); } });
}
boot();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('/app/sw.js', { updateViaCache: 'none' }).catch(() => {}); });
}
</script>
</body>
</html>
