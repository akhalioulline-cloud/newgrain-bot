<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FLAGLEAF — ИИ-агроном</title>
<meta name="description" content="ИИ-агроном Flagleaf: снимите сорняк, болезнь или вредителя — определю и подскажу, чем и когда обработать это поле. Можно спросить и текстом.">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<meta name="apple-mobile-web-app-title" content="Flagleaf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#b9994b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#b9994b; --ink:#1a1a1a; --bg:#faf8f4; --bot:#fff; --usr:#1a1a1a;
         --muted:#8a8a8a; --line:#e7e2d8; --ok:#3a7d44; --bad:#c0392b; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:Roboto,-apple-system,Segoe UI,sans-serif;color:var(--ink);background:var(--bg);
       display:flex;flex-direction:column;min-height:100dvh}
  header{display:block;padding:0;padding-top:env(safe-area-inset-top);border-bottom:1px solid var(--line);
         background:#fff;position:sticky;top:0;z-index:5}
  .hrow{display:flex;align-items:center;gap:10px;padding:12px 16px}
  .navbtns{display:flex;gap:3px;margin-right:2px;flex:none}
  .navb{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;
        font-size:17px;line-height:1;color:var(--ink);cursor:pointer;padding:0}
  .navb:active{background:#f0ece2}
  .tabs{display:flex;border-top:1px solid var(--line);overflow-x:auto}
  .tab{flex:1;text-align:center;padding:10px 5px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;
       text-decoration:none;border-bottom:2px solid transparent}
  .tab.on{color:var(--ink);border-bottom-color:var(--gold)}
  .logo{font-family:Oswald;font-weight:600;letter-spacing:.14em;font-size:18px}
  .logo b{color:var(--gold)}
  .sub{font-size:12px;color:var(--muted);margin-left:auto;text-align:right;line-height:1.2}
  .sub a{color:var(--gold);text-decoration:none}
  .sub .who{color:var(--ink);font-weight:500}
  .logout{color:var(--gold);cursor:pointer;background:none;border:none;font:inherit;padding:0}

  /* field + crop bar (from «Что это?») */
  .fieldbar{display:flex;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto;
            padding:8px 12px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--line);background:#fff}
  .fieldbar select{font:inherit;font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:10px;
                   padding:7px 10px;background:#fff;flex:1;outline:none}
  .fieldbar select:focus{border-color:var(--gold)}
  select.needcrop{border-color:var(--gold)!important;box-shadow:0 0 0 3px rgba(185,153,75,.28)}
  #cropHint{font-size:12.5px;color:#8a6a16;background:#fff7e8;border-bottom:1px solid #f0d79b;
            padding:8px 14px;max-width:760px;margin:0 auto;width:100%}

  #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;
        max-width:760px;width:100%;margin:0 auto}
  .msg{max-width:88%;padding:12px 14px;border-radius:14px;font-size:15px;line-height:1.5;
       white-space:pre-wrap;word-wrap:break-word}
  .bot{align-self:flex-start;background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
  .user{align-self:flex-end;background:var(--usr);color:#fff;border-bottom-right-radius:4px}
  .user img{max-width:200px;border-radius:8px;display:block;margin-bottom:6px}
  .typing{color:var(--muted);font-style:italic}

  /* big camera hero (empty state) */
  .hero{align-self:stretch;border:2px dashed var(--line);border-radius:18px;background:#fff;
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;
        color:var(--muted);text-align:center;padding:30px 24px;margin:4px 0}
  .hero:active{background:#fffdf6;border-color:var(--gold)}
  .hero .big{width:74px;height:74px;border-radius:50%;background:var(--gold);color:#fff;
             display:flex;align-items:center;justify-content:center;font-size:33px}
  .hero .t{font-weight:500;color:var(--ink);font-size:16px}
  .hero .h{font-size:13px;max-width:250px;line-height:1.5}
  .hero .gl{font-size:13.5px;color:var(--gold);font-weight:500;text-decoration:underline}

  /* guess chips inside a bot bubble */
  .guesswrap{align-self:flex-start;max-width:92%;background:var(--bot);border:1px solid var(--line);
             border-radius:14px;border-bottom-left-radius:4px;padding:12px 12px 10px}
  .glabel{font-size:12.5px;color:var(--muted);margin-bottom:8px}
  .guess{width:100%;text-align:left;display:flex;align-items:center;gap:10px;border-radius:12px;
         padding:11px 13px;margin-bottom:7px;background:#fff;border:1px solid var(--line);cursor:pointer;font:inherit}
  .guess.top{background:#faf6ec;border-color:var(--gold)}
  .guess .nm{flex:1;font-weight:500}
  .guess.top .nm{color:#6b541f;font-size:15.5px}
  .guess .cf{font-size:12px;color:var(--muted)}
  .guess .why{font-size:11.5px;color:var(--muted);display:block;font-weight:400}
  .guess:disabled{opacity:.5}
  .guess.picked{border-color:var(--gold);background:#faf6ec}
  .other{width:100%;padding:10px 13px;border:1px dashed var(--line);border-radius:12px;background:transparent;
         color:var(--muted);font-size:13.5px;display:flex;align-items:center;gap:8px;cursor:pointer;font:inherit}
  .typepill{display:inline-block;font-size:11px;color:#6b541f;background:#faf6ec;border:1px solid var(--gold);
            border-radius:14px;padding:2px 9px}
  .otherrow{display:flex;gap:8px;align-items:center;margin-top:8px}
  .otherrow input{flex:1;font:inherit;font-size:16px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;outline:none}
  .otherrow input:focus{border-color:var(--gold)}
  .otherrow .go{flex:none;border:1px solid var(--gold);background:var(--gold);color:#fff;border-radius:10px;
                padding:9px 12px;font:inherit;font-weight:600;cursor:pointer}

  /* composer */
  form{display:flex;gap:6px;align-items:flex-end;padding:10px 12px;border-top:1px solid var(--line);
       background:#fff;max-width:760px;width:100%;margin:0 auto}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:12px;padding:10px 12px;
           font:inherit;font-size:16px;max-height:120px;outline:none}
  textarea:focus{border-color:var(--gold)}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:12px;width:42px;height:42px;
           font-size:18px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center}
  .iconbtn.cam{color:var(--gold);border-color:var(--gold)}
  .send{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
  .send:disabled{opacity:.5;cursor:default}
  .iconbtn.rec{background:#c0392b;border-color:#c0392b;color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.55}}

  /* staged-photo preview above composer */
  .att{display:none;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto;padding:6px 12px;
       font-size:13px;color:var(--muted);border-top:1px solid var(--line);background:#fff}
  .att img{height:40px;border-radius:8px;border:1px solid var(--line)}
  .att .x{cursor:pointer;color:#c0392b;font-weight:700;margin-left:auto}

  .learn{font-size:12.5px;color:var(--ok);display:flex;align-items:center;gap:7px;margin-top:8px}
  .actions{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px}
  .actgrp{display:flex;gap:4px;align-items:center}
  .act{border:none;background:transparent;cursor:pointer;font-size:15px;opacity:.5;padding:3px 6px;border-radius:7px;line-height:1}
  .act:hover{opacity:1;background:#f0ece2}
  .act.on{opacity:1}
  .actnote{font-size:12px;color:var(--muted);align-self:center;margin-left:4px}
  .fbnote{display:flex;gap:6px;margin-top:6px}
  .fbnote input{flex:1;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:6px 8px;outline:none}
  .fbnote input:focus{border-color:var(--gold)}
  .fbnote button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:13px}
  .contactbar{text-align:center;padding:2px 16px}
  .contactbtn{font:inherit;font-size:13px;color:var(--gold);background:#fff;border:1px solid var(--gold);
              border-radius:18px;padding:7px 16px;cursor:pointer}
  .contactbtn:hover{background:var(--gold);color:#fff}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;align-items:center;justify-content:center;padding:16px}
  .modal.open{display:flex}
  .modalbox{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:380px}
  .modaltitle{font-family:Oswald;font-weight:600;font-size:18px;margin-bottom:4px}
  .modalsub{font-size:13px;color:var(--muted);margin:0 0 12px}
  .modalbox input,.modalbox textarea{width:100%;font:inherit;font-size:15px;border:1px solid var(--line);
         border-radius:10px;padding:10px;margin-bottom:8px;outline:none;resize:none}
  .modalbox input:focus,.modalbox textarea:focus{border-color:var(--gold)}
  .modalrow{display:flex;gap:8px;margin-top:4px}
  .modalbtn{flex:1;font:inherit;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;cursor:pointer}
  .modalbtn.primary{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
  .modalbtn:disabled{opacity:.5;cursor:default}
  .modalnote{font-size:13px;color:var(--muted);text-align:center;margin-top:8px}
  .disclaimer{font-size:11px;color:var(--muted);text-align:center;padding:6px 16px}

  /* chief review (in-chat) */
  .rvcard{white-space:normal}
  .rvbtns{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .rvb{font:inherit;font-size:13px;border:1px solid var(--line);background:#fff;border-radius:16px;padding:7px 13px;cursor:pointer}
  .rvb.primary{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
  .rvb.ok{border-color:var(--ok);color:var(--ok)}
  .rvb:disabled{opacity:.5}
  .rvhead{font-size:11px;color:var(--muted);margin-bottom:6px}
  .rvmedia{width:100%;max-height:240px;object-fit:contain;border-radius:10px;background:#f2eee4;margin:2px 0;display:block}
  .rvmeta{font-size:13px;line-height:1.5;margin-top:7px}
  .rvtag{font-size:13px;font-weight:500}
  .rvtag.ok{color:var(--ok)} .rvtag.bad{color:var(--bad)} .rvtag.skip{color:var(--muted)}
  .rvnote{font-size:13px;color:var(--muted)}
  .rvfix{margin-top:8px;display:flex;flex-direction:column;gap:2px}
  .rvl{font-size:12px;color:var(--muted);margin-top:6px}
  .rvin{font:inherit;font-size:16px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;outline:none;background:#fff}
  .rvin:focus{border-color:var(--gold)}
  .hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="navbtns">
      <button class="navb" id="navBack" title="Назад">‹</button>
      <button class="navb" id="navFwd" title="Вперёд">›</button>
      <button class="navb" id="navRefresh" title="Обновить">⟳</button>
    </div>
    <span class="logo">FLAG<b>LEAF</b></span>
    <span class="sub" id="hdrSub"><span class="who" id="hdrWho"></span></span>
  </div>
  <nav class="tabs" id="tabs">
    <a class="tab on" href="/app/assistant.html">💬 Ассистент</a>
    <a class="tab" href="/app/">🔭 Скаутинг</a>
  </nav>
</header>

<div class="fieldbar">
  <span>Поле:</span>
  <select id="field"></select>
  <select id="crop" class="hidden"></select>
</div>
<div id="cropHint" class="hidden">↑ Выберите культуру — тогда дам точные препараты и нормы для этого поля.</div>

<div id="chat"></div>

<div class="att" id="att"><img id="thumb"><span id="attname"></span><span class="x" id="attx">убрать ✕</span></div>

<form id="form">
  <input type="file" id="cam" accept="image/*" capture="environment" hidden>
  <input type="file" id="gal" accept="image/*" hidden>
  <button type="button" class="iconbtn cam" id="camBtn" title="Снять фото" aria-label="Снять фото">📷</button>
  <button type="button" class="iconbtn" id="galBtn" title="Из галереи / файл" aria-label="Из галереи">🖼</button>
  <button type="button" class="iconbtn" id="mic" title="Голосовой ввод" aria-label="Голосовой ввод">🎤</button>
  <textarea id="q" rows="1" placeholder="Вопрос или фото…"></textarea>
  <button type="submit" class="iconbtn send" id="send" title="Отправить" aria-label="Отправить">➤</button>
</form>
<div class="contactbar"><button type="button" id="contactBtn" class="contactbtn">📞 Связаться с агрономом</button></div>
<div class="disclaimer">ИИ-помощник. Рекомендации проверяйте перед применением; за окончательным решением — к агроному.</div>

<div class="modal" id="contactModal">
  <div class="modalbox">
    <div class="modaltitle">Связаться с агрономом</div>
    <p class="modalsub">Оставьте контакт — наш агроном свяжется с вами.</p>
    <input id="cName" placeholder="Имя">
    <input id="cPhone" placeholder="Телефон *" inputmode="tel" autocomplete="tel">
    <textarea id="cMsg" rows="3" placeholder="Ваш вопрос (необязательно)"></textarea>
    <div class="modalrow">
      <button type="button" id="cCancel" class="modalbtn">Отмена</button>
      <button type="button" id="cSend" class="modalbtn primary">Отправить</button>
    </div>
    <div class="modalnote" id="cNote"></div>
  </div>
</div>

<script>
const TOK='flagleaf_session', $=id=>document.getElementById(id);
let session=localStorage.getItem(TOK)||'', fieldsAll=[], ME=null;
let pendingFile=null, pendingURL=null, pendingFromCam=false;
let awaitingCrop=false;                 // bot's last answer asked which crop it is
let started=false;                      // once true, the empty-state hero is gone
const chatHist=[];                      // {role:'user'|'bot', text} — follow-up context
const chat=$('chat'), q=$('q'), form=$('form'), cropSel=$('crop');
const att=$('att'), thumb=$('thumb'), attname=$('attname');
const CATMAP={'сорняк':'weed','болезнь':'disease','вредитель':'pest'};
const CROP_LIST=['Подсолнечник','Соя','Пшеница озимая','Пшеница яровая','Кукуруза','Ячмень',
  'Сахарная свёкла','Горох','Рапс','Гречиха','Овёс','Рожь','Просо','Нут','Лён масличный',
  'Горчица','Кориандр','Многолетние травы'];

async function api(path,opts={}){
  const headers=opts.headers||{}; if(session) headers['x-session']=session;
  const r=await fetch(path,{...opts,headers}); let b=null; try{b=await r.json();}catch(e){}
  if(!r.ok){const err=new Error((b&&b.detail)||('Ошибка '+r.status));err.status=r.status;throw err;} return b;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function curField(){const v=$('field').value; return fieldsAll.find(f=>String(f.id)===v)||null;}
function curCrop(){const f=curField(); if(f) return f.crop||''; return cropSel.value||'';}

// ---------- chat bubbles ----------
function add(text, who){ const d=document.createElement('div'); d.className='msg '+who; d.textContent=text;
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight; return d; }
function addUser(text, imgUrl){ const d=document.createElement('div'); d.className='msg user';
  if(imgUrl){ const im=document.createElement('img'); im.src=imgUrl; d.appendChild(im); }
  if(text){ d.appendChild(document.createTextNode(text)); }
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight; }
function killHero(){ started=true; const h=$('hero'); if(h) h.remove(); }

// ---------- empty-state hero ----------
function showHero(){
  if($('hero')) return;
  const h=document.createElement('div'); h.className='hero'; h.id='hero';
  h.innerHTML='<div class="big">📷</div><div class="t">Сфотографируйте — что это?</div>'+
    '<div class="h">Один сорняк, болезнь или вредитель в кадре, при дневном свете. Определю и подскажу, чем обработать это поле.</div>'+
    '<div class="gl" id="heroGal">🖼 или выбрать из галереи</div>';
  chat.appendChild(h);
  h.onclick=e=>{ if(e.target.id==='heroGal') return; $('cam').click(); };
  $('heroGal').onclick=e=>{ e.stopPropagation(); $('gal').click(); };
}

// ---------- staged photo ----------
function setFile(f, fromCam){
  pendingFile=f; pendingFromCam=!!fromCam;
  if(pendingURL){ URL.revokeObjectURL(pendingURL); pendingURL=null; }
  if(f){ pendingURL=URL.createObjectURL(f); thumb.src=pendingURL; attname.textContent='Фото готово — отправьте или добавьте вопрос';
    att.style.display='flex'; q.placeholder='Добавьте вопрос — или просто отправьте'; q.focus(); }
  else { att.style.display='none'; $('cam').value=''; $('gal').value=''; q.placeholder='Вопрос или фото…'; }
}
$('camBtn').onclick=()=>$('cam').click();
$('galBtn').onclick=()=>$('gal').click();
$('cam').onchange=e=>{ const f=e.target.files[0]; if(f) setFile(f,true); e.target.value=''; };
$('gal').onchange=e=>{ const f=e.target.files[0]; if(f) setFile(f,false); e.target.value=''; };
$('attx').onclick=()=>setFile(null);

q.addEventListener('input', ()=>{ q.style.height='auto'; q.style.height=Math.min(q.scrollHeight,120)+'px'; });

// ---------- send ----------
async function ask(){
  const text=q.value.trim(); const file=pendingFile; const crop=curCrop();
  if(!text && !file) return;
  q.value=''; q.style.height='auto';
  if(!file && isChief() && REVIEW_RE.test(text)){        // chief pulls up the review queue by voice/text
    addUser(text,null); killHero();
    const had=await loadReview(); if(!had) add('Сейчас на проверке ничего нет — всё разобрано 👍','bot');
    return;
  }
  const url=file?pendingURL:null; pendingURL=null;   // hand the object URL to the bubble
  setFile(null);
  killHero();
  if(file) runPhoto(file, text, crop, url);
  else runChat(text, crop, null);
}
form.addEventListener('submit', e=>{ e.preventDefault(); ask(); });
q.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); ask(); } });

// ---------- text / field questions (server handles field routing) ----------
async function runChat(text, crop, imgUrl){
  if(!text) return;
  addUser(text, imgUrl);
  const hist=chatHist.slice(-6);
  const t=add('анализирую…','bot typing');
  $('send').disabled=true;
  try{
    const r=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:text,crop:crop,history:hist})});
    if(r.status===429){ t.textContent='Слишком много запросов за час — попробуйте позже.'; t.className='msg bot'; return; }
    if(!r.ok || !r.body){ t.textContent='Ошибка. Попробуйте ещё раз.'; t.className='msg bot'; return; }
    t.textContent=''; t.className='msg bot';
    const reader=r.body.getReader(), dec=new TextDecoder(); let ans='';
    for(;;){ const {value,done}=await reader.read(); if(done) break;
      ans+=dec.decode(value,{stream:true}); t.textContent=ans; chat.scrollTop=chat.scrollHeight; }
    ans=ans.trim();
    if(ans) finishAnswer(t, ans, text, crop); else { t.textContent='Что-то пошло не так, попробуйте ещё раз.'; }
  }catch(err){ t.textContent='Ошибка сети. Проверьте соединение и попробуйте ещё раз.'; t.className='msg bot'; }
  finally{ $('send').disabled=false; chat.scrollTop=chat.scrollHeight; }
}

// ---------- photo ----------
async function runPhoto(file, caption, crop, imgUrl){
  // «другое поле» без культуры → сначала попросим культуру (как в «Что это?»)
  if(!curField() && !crop){ setFile(file, pendingFromCam);   // вернём фото в компоузер
    nudgeCrop(); return; }
  addUser(caption, imgUrl);
  if(caption){ return diagnose(file, caption, crop); }        // есть вопрос → прямой ответ по фото
  // нет вопроса → распознавание с вариантами (журавль обучения)
  const t=add('определяю…','bot typing');
  const fd=new FormData(); fd.append('image',file); if(crop) fd.append('crop',crop);
  try{
    const r=await api('/api/recognize',{method:'POST',body:fd});
    if(r&&r.ok){ t.remove(); guessBubble(r, file, crop); }
    else { t.textContent='Не удалось распознать. Снимите поближе и почётче, при дневном свете.'; t.className='msg bot'; }

// recognition guesses as a bot bubble with tappable chips
function guessBubble(r, file, crop){
  const top=r.top||{}, alts=(r.alternatives||[]).slice(0,2);
  const conf=Number(top.confidence)||0, sure=conf>=60 && top.ru;
  const cls=top.class? `<span class="typepill">${top.class==='злаковый'?'злаковый':'двудольный'}</span>`:'';
  const box=document.createElement('div'); box.className='guesswrap';
  let h=`<div class="glabel">${sure?'Скорее всего это '+cls:'Не уверен — помогите определить '+cls}</div>`;
  if(top.ru){ h+=`<button class="guess top" data-w="${esc(top.ru)}" data-c="${esc(top.category||'сорняк')}">`+
      `<span class="nm">${esc(top.ru)}</span><span class="cf">${conf?conf+'%':''}</span></button>`; }
  for(const a of alts){ const nm=a.name||a; if(!nm) continue;
    h+=`<button class="guess" data-w="${esc(nm)}" data-c="сорняк"><span class="nm">${esc(nm)}`+
       (a.why?`<span class="why">${esc(a.why)}</span>`:'')+`</span></button>`; }
  h+=`<button class="other" id="otherBtn">❓ Другое — подскажите, что это</button>`+
     `<div id="otherArea" class="hidden"><div class="otherrow">`+
     `<input type="text" id="otherIn" placeholder="скажите или впишите, что это"><button class="go" id="otherGo">Готово</button></div></div>`;
  box.innerHTML=h; chat.appendChild(box);
  const pick=(w,c,btn)=>{ box.querySelectorAll('.guess,.other').forEach(b=>b.disabled=true);
    if(btn){ btn.classList.add('picked'); } decideInChat(w, c, file, crop); };
  box.querySelectorAll('.guess').forEach(b=>b.onclick=()=>pick(b.dataset.w,b.dataset.c,b));
  $('otherBtn').onclick=()=>{ $('otherArea').classList.remove('hidden'); $('otherBtn').classList.add('hidden');
    $('otherIn').focus();
    const go=()=>{ const v=$('otherIn').value.trim(); if(v){ box.querySelectorAll('.guess,.other,#otherGo').forEach(b=>b.disabled=true); decideInChat(v,'',file,crop); } };
    $('otherGo').onclick=go; $('otherIn').addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();go();} }); };
  chat.scrollTop=chat.scrollHeight;
}

function buildQuestion(obj, ruCat, crop){
  const c=crop||'культуру';
  if(ruCat==='болезнь')   return `«${obj}» на ${c}: чем защитить и лечить — зарегистрированный препарат, норма, сроки. Только конкретные решения.`;
  if(ruCat==='вредитель') return `«${obj}» на ${c}: чем защитить — зарегистрированный препарат, норма, сроки по ЭПВ. Только конкретные решения.`;
  if(ruCat==='сорняк')    return `Чем обработать ${c} от «${obj}»? Пора ли по ЭПВ, норма, сколько обработок? Только зарегистрированные препараты, по делу.`;
  return `Агроном определил на поле (культура: ${c}): «${obj}». Дай практический ответ по сути: если это сорняк — чем обработать (зарегистрированный препарат, норма, сроки по ЭПВ); если болезнь или вредитель — чем защитить; если это повреждение или состояние самой культуры (например, гербицидный ожог) — конкретные меры, чтобы помочь растению (антистресс/стимулятор с нормой, подкормка, агроприёмы). Только решения.`;
}
async function decideInChat(weed, ruCat, file, crop){
  logToFlywheel(file, weed, CATMAP[ruCat]||'weed');           // correction = the label
  const t=add('подбираю решение…','bot typing');
  const qtext=buildQuestion(weed, ruCat, crop);
  try{
    const r=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:qtext,crop:crop,structured:true})});
    if(!r.ok||!r.body){ t.textContent='Не удалось получить ответ. Попробуйте ещё раз.'; t.className='msg bot'; return; }
    t.textContent=''; t.className='msg bot';
    const rd=r.body.getReader(), dec=new TextDecoder(); let txt='';
    for(;;){ const {value,done}=await rd.read(); if(done)break; txt+=dec.decode(value,{stream:true}); t.textContent=txt; chat.scrollTop=chat.scrollHeight; }
    txt=txt.trim();
    if(txt){ const learn=document.createElement('div'); learn.className='learn'; learn.innerHTML='<span>✓</span> +1 наблюдение обучает ИИ Flagleaf'; t.appendChild(learn);
      finishAnswer(t, txt, weed, crop, true); }
    else t.textContent='Что-то пошло не так, попробуйте ещё раз.';
  }catch(e){ t.textContent='Ошибка сети. Попробуйте ещё раз.'; t.className='msg bot'; }
  finally{ chat.scrollTop=chat.scrollHeight; }
}
function logToFlywheel(file, species, cat){

  const fd=new FormData(); fd.append('photos',file); fd.append('category',cat); fd.append('species',species);
  const f=curField(); if(f) fd.append('field_id',String(f.id));

const micBtn=$('mic');
let recording=false, audioCtx=null, micStream=null, micProc=null, micChunks=[];
micBtn.onclick=async()=>{
  if(recording){ stopRec(); return; }
  try{ micStream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ alert('Нет доступа к микрофону — разрешите его в браузере.'); return; }
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const src=audioCtx.createMediaStreamSource(micStream);
  micProc=audioCtx.createScriptProcessor(4096,1,1); micChunks=[];
  micProc.onaudioprocess=e=>{ micChunks.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
  src.connect(micProc); micProc.connect(audioCtx.destination);
  recording=true; micBtn.classList.add('rec'); micBtn.textContent='⏹'; q.placeholder='Говорите… нажмите ⏹';
};
function stopRec(){
  recording=false; micBtn.classList.remove('rec'); micBtn.textContent='🎤'; q.placeholder='Вопрос или фото…';
  try{ micProc.disconnect(); }catch(e){}
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  const inRate=audioCtx.sampleRate;
  let len=micChunks.reduce((a,c)=>a+c.length,0); const buf=new Float32Array(len); let off=0;
  for(const c of micChunks){ buf.set(c,off); off+=c.length; }
  try{ audioCtx.close(); }catch(e){}
  if(len<inRate*0.3){ return; }
  sendAudio(to16kInt16(buf,inRate));
}
function to16kInt16(buf,inRate){
  const ratio=inRate/16000, outLen=Math.floor(buf.length/ratio), out=new Int16Array(outLen);
  for(let i=0;i<outLen;i++){ const s=Math.max(-1,Math.min(1,buf[Math.floor(i*ratio)]||0)); out[i]=s<0?s*0x8000:s*0x7FFF; }
  return out.buffer;
}
async function sendAudio(pcm){
  q.placeholder='Распознаю речь…';
  try{
    const r=await fetch('/api/transcribe',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:pcm});
    const j=await r.json();
    if(j.text){ q.value=(q.value?q.value+' ':'')+j.text; q.dispatchEvent(new Event('input')); q.focus(); q.placeholder='Вопрос или фото…'; }
    else { q.placeholder='Не расслышал — повторите'; setTimeout(()=>q.placeholder='Вопрос или фото…',2500); }
  }catch(e){ q.placeholder='Ошибка распознавания'; setTimeout(()=>q.placeholder='Вопрос или фото…',2500); }
}

let reviewItems=[], rvApproved=0, rvSkipped=0;
const RUCAT={weed:'сорняк',disease:'болезнь',pest:'вредитель'};
const isChief=()=>ME && (ME.role==='chief_agronomist'||ME.role==='admin');
const REVIEW_RE=/на\s*проверк|(покаж|показ|дай|открой|что)\w*\s.*(проверк|материал|очеред)|материал\w*\s+на\s+проверк|очеред\w*\s+проверк/i;

async function reviewApi(id, action, corr){
  const body={submission_id:id, action, ...(corr||{})};
  try{ const r=await fetch('/api/review/decide',{method:'POST',
    headers:{'Content-Type':'application/json','x-session':session}, body:JSON.stringify(body)});
    return r.ok; }catch(e){ return false; }
}
async function loadReview(){
  if(!isChief()) return false;
  try{ const r=await api('/api/review/pending'); reviewItems=r.items||[]; }catch(e){ return false; }
  rvApproved=0; rvSkipped=0;
  if(!reviewItems.length) return false;
  reviewDigest(); return true;
}
function reviewDigest(){
  const ph=reviewItems.filter(i=>!i.is_video).length, vd=reviewItems.length-ph;
  const parts=[]; if(ph) parts.push(`<b>${ph} фото</b>`); if(vd) parts.push(`<b>${vd} видео скаутинга</b>`);
  const first=ME&&ME.name?', '+esc(ME.name.split(' ')[0]):'';
  const d=document.createElement('div'); d.className='msg bot rvcard'; d.style.maxWidth='92%';
  d.innerHTML=`<div style="font-weight:500">🌅 Доброе утро${first}!</div>На проверке: ${parts.join(' и ')}.`+
    `<div class="rvbtns"><button class="rvb primary rv-all">✅ Подтвердить все</button>`+
    `<button class="rvb rv-one">Проверить по одной</button></div>`;
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight;
  d.querySelector('.rv-all').onclick=()=>confirmAllPrompt(d);
  d.querySelector('.rv-one').onclick=()=>{ d.querySelector('.rvbtns').remove(); reviewCard(0); };
}
function confirmAllPrompt(d){
  const box=d.querySelector('.rvbtns');
  box.innerHTML=`<span class="rvnote">Подтвердить все ${reviewItems.length}? Отменить нельзя.</span>`+
    `<button class="rvb primary rv-yes">Да, все</button><button class="rvb rv-no">Отмена</button>`;
  box.querySelector('.rv-yes').onclick=()=>confirmAll(d);
  box.querySelector('.rv-no').onclick=()=>{ box.remove();
    reviewDigest(); d.remove(); };   // redraw a fresh digest below
}
async function confirmAll(d){
  const box=d.querySelector('.rvbtns'); box.innerHTML='<span class="rvnote">Подтверждаю…</span>';
  const note=box.querySelector('.rvnote'); let ok=0, n=reviewItems.length;
  for(const it of reviewItems){ if(await reviewApi(it.id,'approve')) ok++; note.textContent=`Подтверждаю… ${ok}/${n}`; }
  box.innerHTML=`<span class="rvtag ok">✅ Подтверждено ${ok} — материалы уходят в разметку. Спасибо!</span>`;
  reviewItems=[];
}
function reviewCard(i){
  if(i>=reviewItems.length){ reviewDone(); return; }
  const it=reviewItems[i];
  const card=document.createElement('div'); card.className='msg bot rvcard'; card.style.maxWidth='94%';
  const media = it.media_url ? (it.is_video
      ? `<video src="${esc(it.media_url)}" controls playsinline preload="metadata" class="rvmedia"></video>`
      : `<img src="${esc(it.media_url)}" class="rvmedia" alt="">`)
    : '<div class="rvnote">(медиа недоступно)</div>';
  const rucat=RUCAT[it.category]||it.category||'';
  card.innerHTML=
    `<div class="rvhead">${i+1} из ${reviewItems.length} · ${it.is_video?'видео скаутинга':'фото'}</div>`+media+
    `<div class="rvmeta"><b>${esc(it.subcategory||'—')}</b>${rucat?' · '+esc(rucat):''}<br>`+
    `${esc(it.field_name||'поле не указано')}${it.submitter?' · '+esc(it.submitter):''}`+
    `${it.comment?'<br>💬 '+esc(it.comment):''}${it.transcript?'<br>🎤 '+esc(it.transcript):''}</div>`+
    `<div class="rvbtns"><button class="rvb ok rv-v">✅ Верно</button>`+
    `<button class="rvb rv-e">✏️ Исправить</button><button class="rvb rv-s">⏭ Пропустить</button></div>`+
    `<div class="rvfix hidden"></div>`;
  chat.appendChild(card); chat.scrollTop=chat.scrollHeight;
  const btns=card.querySelector('.rvbtns');
  const tag=(label,cls)=>{ btns.innerHTML=`<span class="rvtag ${cls}">${label}</span>`; };
  card.querySelector('.rv-v').onclick=async()=>{ btns.querySelectorAll('button').forEach(b=>b.disabled=true);
    const ok=await reviewApi(it.id,'approve'); if(ok){ rvApproved++; tag('✅ Подтверждено','ok'); reviewCard(i+1); }
    else tag('Ошибка — попробуйте позже','bad'); };
  card.querySelector('.rv-s').onclick=()=>{ rvSkipped++; tag('⏭ Пропущено','skip'); reviewCard(i+1); };

function openFix(card, it, i){

}

    try{ me=await api('/api/me'); }catch(e){ session=''; localStorage.removeItem(TOK); }
    if(me){
      ME=me;
      if(who) who.textContent=me.name||'';
      if(hdr) hdr.insertAdjacentHTML('beforeend',' · <button class="logout" id="lo">выйти</button>');
      const lo=$('lo'); if(lo) lo.onclick=()=>{ localStorage.removeItem(TOK); location.href='/app/'; };
    } else guest();
  } else guest();
  // fields + crops
  try{
    const r=await api('/api/fields'); fieldsAll=r.fields||[];
    $('field').innerHTML=fieldsAll.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('')+'<option value="">— другое поле —</option>';
    const merged=[...new Set(fieldsAll.map(f=>f.crop).filter(Boolean))], seen=new Set(merged.map(c=>c.toLowerCase()));
    for(const c of CROP_LIST){ if(!seen.has(c.toLowerCase())){ merged.push(c); seen.add(c.toLowerCase()); } }
    cropSel.innerHTML='<option value="">— культура —</option>'+merged.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
    const last=localStorage.getItem('scanField');
    $('field').value=(last!==null && (last===''||fieldsAll.some(f=>String(f.id)===last))) ? last : '';   // default: другое поле
    const toggleCrop=()=>cropSel.classList.toggle('hidden',$('field').value!=='');
    toggleCrop();
    $('field').onchange=()=>{ localStorage.setItem('scanField',$('field').value); toggleCrop(); clearHint(); };
  }catch(e){}
  // chief → the morning review digest comes to him in-chat; everyone else → the camera hero
  const showedReview = await loadReview();
  if(!showedReview){
    if(new URLSearchParams(location.search).get('review') && isChief())
      add('Сейчас на проверке ничего нет — всё разобрано 👍','bot');
    showHero();
  }
}
boot();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/app/sw.js', { updateViaCache: 'none' }).catch(() => {});
  });
}
</script>
