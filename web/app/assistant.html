<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FLAGLEAF — ИИ-агроном</title>
<meta name="description" content="ИИ-агроном Flagleaf: определит сорняк, болезнь или вредителя по фото и подскажет, чем обработать — с учётом зарегистрированных препаратов.">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<meta name="apple-mobile-web-app-title" content="Flagleaf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#b9994b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#b9994b; --ink:#1a1a1a; --bg:#faf8f4; --bot:#fff; --usr:#1a1a1a;
         --muted:#8a8a8a; --line:#e7e2d8; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:Roboto,-apple-system,Segoe UI,sans-serif;color:var(--ink);background:var(--bg);
       display:flex;flex-direction:column;min-height:100dvh}
  header{display:block;padding:0;padding-top:env(safe-area-inset-top);border-bottom:1px solid var(--line);
         background:#fff;position:sticky;top:0;z-index:5}
  .hrow{display:flex;align-items:center;gap:10px;padding:12px 16px}
  .navbtns{display:flex;gap:3px;margin-right:2px;flex:none}
  .navb{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;
        font-size:17px;line-height:1;color:var(--ink);cursor:pointer;padding:0}
  .navb:active{background:#f0ece2}
  .tabs{display:flex;border-top:1px solid var(--line);overflow-x:auto}
  .tab{flex:1;text-align:center;padding:10px 5px;font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;
       text-decoration:none;border-bottom:2px solid transparent}
  .tab.on{color:var(--ink);border-bottom-color:var(--gold)}
  .logo{font-family:Oswald;font-weight:600;letter-spacing:.14em;font-size:18px}
  .logo b{color:var(--gold)}
  .sub{font-size:12px;color:var(--muted);margin-left:auto;text-align:right;line-height:1.2}
  .sub a{color:var(--gold);text-decoration:none}
  #chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;
        max-width:760px;width:100%;margin:0 auto}
  .msg{max-width:88%;padding:12px 14px;border-radius:14px;font-size:15px;line-height:1.5;
       white-space:pre-wrap;word-wrap:break-word}
  .bot{align-self:flex-start;background:var(--bot);border:1px solid var(--line);border-bottom-left-radius:4px}
  .user{align-self:flex-end;background:var(--usr);color:#fff;border-bottom-right-radius:4px}
  .user img{max-width:200px;border-radius:8px;display:block;margin-bottom:6px}
  .typing{color:var(--muted);font-style:italic}
  form{display:flex;gap:8px;align-items:flex-end;padding:10px 12px;border-top:1px solid var(--line);
       background:#fff;max-width:760px;width:100%;margin:0 auto}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:12px;padding:10px 12px;
           font:inherit;max-height:120px;outline:none}
  textarea:focus{border-color:var(--gold)}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:12px;width:44px;height:44px;
           font-size:18px;cursor:pointer;flex:none}
  .send{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
  .send:disabled{opacity:.5;cursor:default}
  .thumb{height:40px;border-radius:8px;border:1px solid var(--line)}
  .att{display:none;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto;padding:4px 12px;
       font-size:13px;color:var(--muted)}
  .att .x{cursor:pointer;color:#c0392b;font-weight:700}
  .cropbar{display:flex;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto;
           padding:4px 12px;font-size:13px;color:var(--muted)}
  .cropbar select{font:inherit;font-size:13px;color:var(--ink);border:1px solid var(--line);
                  border-radius:10px;padding:6px 10px;background:#fff;outline:none}
  .cropbar select:focus{border-color:var(--gold)}
  .crophint{font-size:12px;color:var(--gold)}
  .planbtn{margin-left:auto;font:inherit;font-size:13px;color:var(--gold);background:#fff;
           border:1px solid var(--gold);border-radius:14px;padding:5px 12px;cursor:pointer;white-space:nowrap}
  .planbtn:active{background:#faf6ec}
  .actions{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:8px}
  .actgrp{display:flex;gap:4px;align-items:center}
  .act{border:none;background:transparent;cursor:pointer;font-size:15px;opacity:.5;
       padding:3px 6px;border-radius:7px;line-height:1}
  .act:hover{opacity:1;background:#f0ece2}
  .act.on{opacity:1}
  .actnote{font-size:12px;color:var(--muted);align-self:center;margin-left:4px}
  .iconbtn.rec{background:#c0392b;border-color:#c0392b;color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.55}}
  .fbnote{display:flex;gap:6px;margin-top:6px}
  .fbnote input{flex:1;font:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;
                padding:6px 8px;outline:none}
  .fbnote input:focus{border-color:var(--gold)}
  .fbnote button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 10px;
                 cursor:pointer;font-size:13px}
  .contactbar{text-align:center;padding:2px 16px}
  .contactbtn{font:inherit;font-size:13px;color:var(--gold);background:#fff;border:1px solid var(--gold);
              border-radius:18px;padding:7px 16px;cursor:pointer}
  .contactbtn:hover{background:var(--gold);color:#fff}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;
         align-items:center;justify-content:center;padding:16px}
  .modal.open{display:flex}
  .modalbox{background:#fff;border-radius:14px;padding:18px;width:100%;max-width:380px}
  .modaltitle{font-family:Oswald;font-weight:600;font-size:18px;margin-bottom:4px}
  .modalsub{font-size:13px;color:var(--muted);margin:0 0 12px}
  .modalbox input,.modalbox textarea{width:100%;font:inherit;font-size:15px;border:1px solid var(--line);
         border-radius:10px;padding:10px;margin-bottom:8px;outline:none;resize:none}
  .modalbox input:focus,.modalbox textarea:focus{border-color:var(--gold)}
  .modalrow{display:flex;gap:8px;margin-top:4px}
  .modalbtn{flex:1;font:inherit;border:1px solid var(--line);background:#fff;border-radius:10px;
            padding:10px;cursor:pointer}
  .modalbtn.primary{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
  .modalbtn:disabled{opacity:.5;cursor:default}
  .modalnote{font-size:13px;color:var(--muted);text-align:center;margin-top:8px}
  .disclaimer{font-size:11px;color:var(--muted);text-align:center;padding:6px 16px}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="navbtns">
      <button class="navb" id="navBack" title="Назад">‹</button>
      <button class="navb" id="navFwd" title="Вперёд">›</button>
      <button class="navb" id="navRefresh" title="Обновить">⟳</button>
    </div>
    <span class="logo">FLAG<b>LEAF</b></span>
    <span class="sub">ИИ-агроном</span>
  </div>
  <nav class="tabs">
    <a class="tab" href="/app/scan.html">🔍 Что это?</a>
    <a class="tab" href="/app/">🔭 Скаутинг</a>
    <a class="tab on" href="/app/assistant.html">💬 Ассистент</a>
  </nav>
</header>

<div id="chat"></div>

<div class="att" id="att"><img class="thumb" id="thumb"><span id="attname"></span><span class="x" id="attx">убрать ✕</span></div>

<div class="cropbar">
  <label for="crop">🌱 Культура:</label>
  <select id="crop">
    <option value="">— не указана —</option>
    <option>Подсолнечник</option>
    <option>Соя</option>
    <option>Пшеница озимая</option>
    <option>Пшеница яровая</option>
    <option>Ячмень</option>
    <option>Кукуруза</option>
    <option>Рапс</option>
    <option>Сахарная свёкла</option>
    <option>Горох</option>
  </select>
  <span class="crophint" id="cropHint"></span>
  <button type="button" class="planbtn" id="planBtn">📋 План по полю</button>
</div>

<form id="form">
  <input type="file" id="file" accept="image/*" hidden>
  <button type="button" class="iconbtn" id="attach" title="Прикрепить фото">📎</button>
  <button type="button" class="iconbtn" id="mic" title="Голосовой ввод">🎤</button>
  <textarea id="q" rows="1" placeholder="Ваш вопрос агроному…"></textarea>
  <button type="submit" class="iconbtn send" id="send" title="Отправить">➤</button>
</form>
<div class="contactbar"><button type="button" id="contactBtn" class="contactbtn">📞 Связаться с агрономом</button></div>
<div class="disclaimer">ИИ-помощник. Рекомендации проверяйте перед применением; за окончательным решением — к агроному.</div>

<div class="modal" id="contactModal">
  <div class="modalbox">
    <div class="modaltitle">Связаться с агрономом</div>
    <p class="modalsub">Оставьте контакт — наш агроном свяжется с вами.</p>
    <input id="cName" placeholder="Имя">
    <input id="cPhone" placeholder="Телефон *" inputmode="tel" autocomplete="tel">
    <textarea id="cMsg" rows="3" placeholder="Ваш вопрос (необязательно)"></textarea>
    <div class="modalrow">
      <button type="button" id="cCancel" class="modalbtn">Отмена</button>
      <button type="button" id="cSend" class="modalbtn primary">Отправить</button>
    </div>
    <div class="modalnote" id="cNote"></div>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const q = document.getElementById('q');
const form = document.getElementById('form');
const fileInput = document.getElementById('file');
const att = document.getElementById('att'), thumb = document.getElementById('thumb'), attname = document.getElementById('attname');
const cropSel = document.getElementById('crop');
const cropHint = document.getElementById('cropHint');
let pendingFile = null;
let awaitingCrop = false;   // true when the bot's last answer asked which crop it is
const history = [];   // {role:'user'|'bot', text} — sent for follow-up context

function add(text, who){ const d=document.createElement('div'); d.className='msg '+who; d.textContent=text;
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight; return d; }
function addUser(text, imgUrl){ const d=document.createElement('div'); d.className='msg user';
  if(imgUrl){ const im=document.createElement('img'); im.src=imgUrl; d.appendChild(im); }
  if(text){ d.appendChild(document.createTextNode(text)); }
  chat.appendChild(d); chat.scrollTop=chat.scrollHeight; }

add('Здравствуйте! Я ИИ-агроном Flagleaf. Пришлите фото сорняка/болезни с вопросом — определю и подскажу, чем обработать. Можно спросить текстом или голосом 🎤.', 'bot');

function setFile(f){ pendingFile=f; if(f){ thumb.src=URL.createObjectURL(f); attname.textContent=f.name; att.style.display='flex'; }
  else { att.style.display='none'; fileInput.value=''; } }
document.getElementById('attach').onclick=()=>fileInput.click();
fileInput.onchange=e=>{ if(e.target.files[0]) setFile(e.target.files[0]); };
document.getElementById('attx').onclick=()=>setFile(null);

q.addEventListener('input', ()=>{ q.style.height='auto'; q.style.height=Math.min(q.scrollHeight,120)+'px'; });

function sendFeedback(vote, note, question, answer, crop){
  fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({vote,note,question,answer,crop})}).catch(()=>{});
}
function mkAct(label,title){ const b=document.createElement('button'); b.className='act'; b.title=title; b.textContent=label; return b; }

// per-answer row: 📋 copy · 👍 · 👎(+optional note) · 🧮 calc (only when there are products)
function addActions(el, answerText, question, crop){
  const bar=document.createElement('div'); bar.className='actions';
  const note=document.createElement('span'); note.className='actnote';
  let voted=false;
  const copy=mkAct('📋','Скопировать');
  copy.onclick=()=>{ navigator.clipboard.writeText(answerText).then(()=>{
    copy.textContent='✓'; setTimeout(()=>copy.textContent='📋',1200); }).catch(()=>{}); };
  const share=mkAct('📤','Поделиться');
  share.onclick=async()=>{
    const txt=answerText+'\n\n— ИИ-агроном Flagleaf · ai.flagleaf.ru';
    if(navigator.share){ try{ await navigator.share({title:'Flagleaf — ИИ-агроном', text:txt}); }catch(e){} }
    else { navigator.clipboard.writeText(txt).then(()=>{ share.textContent='✓';
      setTimeout(()=>share.textContent='📤',1200); }).catch(()=>{}); }
  };
  const up=mkAct('👍','Хороший ответ');
  up.onclick=()=>{ if(voted)return; voted=true; up.classList.add('on'); note.textContent='Спасибо за отзыв!';
    sendFeedback('up',null,question,answerText,crop); };
  const down=mkAct('👎','Плохой ответ');
  down.onclick=()=>{ if(voted)return; voted=true; down.classList.add('on');
    sendFeedback('down',null,question,answerText,crop);          // capture the vote right away
    const box=document.createElement('div'); box.className='fbnote';
    const inp=document.createElement('input'); inp.placeholder='Что не так? (необязательно)';
    const snd=document.createElement('button'); snd.textContent='Отправить';
    let sent=false;
    const post=()=>{ if(sent)return; sent=true; const v=inp.value.trim();
      if(v) sendFeedback('down',v,question,answerText,crop);     // richer correction
      box.remove(); note.textContent='Спасибо за отзыв!'; };
    snd.onclick=post; inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); post(); } });
    box.append(inp,snd); el.appendChild(box); inp.focus(); };
  const left=document.createElement('div'); left.className='actgrp';
  const right=document.createElement('div'); right.className='actgrp';
  left.append(copy,share);
  if(/л\/га|кг\/га|мл\/га|г\/га|норма|препарат/i.test(answerText)){
    const calc=mkAct('🧮','Рассчитать на площадь');
    calc.onclick=()=>{ const ha=(prompt('На какую площадь рассчитать препараты, га?')||'').replace(',','.');
      if(parseFloat(ha)>0) runChat('Рассчитай, сколько нужно каждого препарата из предыдущего ответа на '+ha
        +' га: общий объём препарата и рабочего раствора, по нормам расхода из предыдущего ответа.', cropSel.value, null); };
    left.append(calc);
  }
  right.append(note,up,down);
  bar.append(left,right); el.appendChild(bar);
}

async function runChat(text, crop, file){
  if(!text && !file) return;
  addUser(text, file?URL.createObjectURL(file):null);
  const hist = history.slice(-6);
  const t=add('анализирую…','bot typing');
  document.getElementById('send').disabled=true;
  const finishAnswer=(ans)=>{                    // shared tail: actions + history + crop-follow-up flag
    t.textContent=ans; t.className='msg bot';
    addActions(t, ans, text, crop);
    history.push({role:'user',text:text||'[фото поля]'}); history.push({role:'bot',text:ans});
    awaitingCrop = /культур/i.test(ans) && /(уточн|укаж|какая|какую|подтверд)/i.test(ans);
  };
  try{
    if(file){                                    // photo diagnosis — one-shot JSON (vision call)
      const fd=new FormData(); fd.append('image',file); fd.append('question',text); fd.append('crop',crop);
      const r=await fetch('/api/diagnose',{method:'POST',body:fd});
      if(r.status===429){ t.textContent='Слишком много запросов за час — попробуйте позже.'; t.className='msg bot'; return; }
      const j=await r.json(); const ans=j.answer||'Что-то пошло не так, попробуйте ещё раз.';
      if(j.answer) finishAnswer(ans); else { t.textContent=ans; t.className='msg bot'; }
      return;
    }
    // text question — stream the answer word-by-word for responsiveness
    const r=await fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({question:text,crop:crop,history:hist})});
    if(r.status===429){ t.textContent='Слишком много запросов за час — попробуйте позже.'; t.className='msg bot'; return; }
    if(!r.ok || !r.body){ t.textContent='Ошибка. Попробуйте ещё раз.'; t.className='msg bot'; return; }
    t.textContent=''; t.className='msg bot';
    const reader=r.body.getReader(), dec=new TextDecoder(); let ans='';
    for(;;){
      const {value,done}=await reader.read(); if(done) break;
      ans += dec.decode(value,{stream:true});
      t.textContent=ans; chat.scrollTop=chat.scrollHeight;
    }
    ans=ans.trim();
    if(ans) finishAnswer(ans); else { t.textContent='Что-то пошло не так, попробуйте ещё раз.'; t.className='msg bot'; }
  }catch(err){ t.textContent='Ошибка сети. Проверьте соединение и попробуйте ещё раз.'; t.className='msg bot'; }
  finally{ document.getElementById('send').disabled=false; chat.scrollTop=chat.scrollHeight; }
}

function ask(){
  const text=q.value.trim(); const file=pendingFile; const crop=cropSel.value;
  if(!text && !file) return;
  q.value=''; q.style.height='auto'; setFile(null);
  if(planMode){ planMode=false; runPlan(text); return; }   // «План по полю» captured the field
  runChat(text, crop, file);
}
form.addEventListener('submit', e=>{ e.preventDefault(); ask(); });
q.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); ask(); } });

// ---- «План по полю» (Pilot v2): field → /api/plan (needs the app session) ----
const planSession = localStorage.getItem('flagleaf_session') || '';
let planMode = false;
document.getElementById('planBtn').onclick = ()=>{
  if(!planSession){ add('Чтобы составить план по полю, войдите в приложение (вкладка «Загрузка»).','bot'); return; }
  add('По какому полю составить план работ? Введите номер поля, например 121/140.','bot');
  planMode = true; q.focus();
};
async function runPlan(field){
  if(!field){ planMode=false; return; }
  addUser(field);
  const t=add('составляю план по полю…','bot typing');
  try{
    const r=await fetch('/api/plan',{method:'POST',
      headers:{'Content-Type':'application/json','x-session':planSession},
      body:JSON.stringify({field})});
    if(r.status===401||r.status===403){
      t.textContent='Войдите в приложение (вкладка «Загрузка»), чтобы составить план.'; t.className='msg bot'; return; }
    const j=await r.json();
    t.textContent=(j && j.plan) || 'Не удалось составить план.'; t.className='msg bot';
  }catch(e){ t.textContent='Ошибка сети. Попробуйте ещё раз.'; t.className='msg bot'; }
  finally{ chat.scrollTop=chat.scrollHeight; }
}

// crop menu is active at any point: if the bot asked which crop, picking it answers now;
// otherwise it just sets the crop for the next question (with a brief confirmation).
cropSel.addEventListener('change', ()=>{
  const c=cropSel.value; if(!c) return;
  if(awaitingCrop){ awaitingCrop=false; cropHint.textContent=''; runChat(c, c, null); }
  else { cropHint.textContent='✓ учту в следующем вопросе';
    setTimeout(()=>{ if(cropHint.textContent.startsWith('✓')) cropHint.textContent=''; }, 2500); }
});

// ---- voice: Web Audio capture → 16 kHz mono LPCM → /api/transcribe (SpeechKit) ----
const micBtn=document.getElementById('mic');
let recording=false, audioCtx=null, micStream=null, micProc=null, micChunks=[];
micBtn.onclick=async()=>{
  if(recording){ stopRec(); return; }
  try{ micStream=await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ alert('Нет доступа к микрофону — разрешите его в браузере.'); return; }
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  const src=audioCtx.createMediaStreamSource(micStream);
  micProc=audioCtx.createScriptProcessor(4096,1,1); micChunks=[];
  micProc.onaudioprocess=e=>{ micChunks.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
  src.connect(micProc); micProc.connect(audioCtx.destination);
  recording=true; micBtn.classList.add('rec'); micBtn.textContent='⏹'; q.placeholder='Говорите… нажмите ⏹';
};
function stopRec(){
  recording=false; micBtn.classList.remove('rec'); micBtn.textContent='🎤'; q.placeholder='Ваш вопрос агроному…';
  try{ micProc.disconnect(); }catch(e){}
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  const inRate=audioCtx.sampleRate;
  let len=micChunks.reduce((a,c)=>a+c.length,0); const buf=new Float32Array(len); let off=0;
  for(const c of micChunks){ buf.set(c,off); off+=c.length; }
  try{ audioCtx.close(); }catch(e){}
  if(len<inRate*0.3){ return; }                       // <0.3 s — ignore stray taps
  sendAudio(to16kInt16(buf,inRate));
}
function to16kInt16(buf,inRate){
  const ratio=inRate/16000, outLen=Math.floor(buf.length/ratio), out=new Int16Array(outLen);
  for(let i=0;i<outLen;i++){ const s=Math.max(-1,Math.min(1,buf[Math.floor(i*ratio)]||0)); out[i]=s<0?s*0x8000:s*0x7FFF; }
  return out.buffer;
}
async function sendAudio(pcm){
  q.placeholder='Распознаю речь…';
  try{
    const r=await fetch('/api/transcribe',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:pcm});
    const j=await r.json();
    if(j.text){ q.value=(q.value?q.value+' ':'')+j.text; q.dispatchEvent(new Event('input')); q.focus(); q.placeholder='Ваш вопрос агроному…'; }
    else { q.placeholder='Не расслышал — повторите'; setTimeout(()=>q.placeholder='Ваш вопрос агроному…',2500); }
  }catch(e){ q.placeholder='Ошибка распознавания'; setTimeout(()=>q.placeholder='Ваш вопрос агроному…',2500); }
}

// ---- «Связаться с агрономом» lead form → /api/contact ----
const cModal=document.getElementById('contactModal');
const cName=document.getElementById('cName'), cPhone=document.getElementById('cPhone'),
      cMsg=document.getElementById('cMsg'), cNote=document.getElementById('cNote');
document.getElementById('contactBtn').onclick=()=>{ cNote.textContent=''; cModal.classList.add('open'); cName.focus(); };
document.getElementById('cCancel').onclick=()=>cModal.classList.remove('open');
cModal.addEventListener('click', e=>{ if(e.target===cModal) cModal.classList.remove('open'); });
document.getElementById('cSend').onclick=async()=>{
  const name=cName.value.trim(), phone=cPhone.value.trim(), message=cMsg.value.trim();
  if(phone.replace(/\D/g,'').length<5){ cNote.textContent='Укажите телефон для связи.'; cPhone.focus(); return; }
  const btn=document.getElementById('cSend'); btn.disabled=true; cNote.textContent='Отправляю…';
  try{
    const r=await fetch('/api/contact',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,phone,message})});
    if(r.ok){ cNote.textContent='Спасибо! Агроном свяжется с вами.';
      cName.value=''; cPhone.value=''; cMsg.value='';
      setTimeout(()=>{ cModal.classList.remove('open'); cNote.textContent=''; }, 1600); }
    else { cNote.textContent='Не удалось отправить — проверьте телефон и попробуйте ещё раз.'; }
  }catch(e){ cNote.textContent='Ошибка сети. Попробуйте ещё раз.'; }
  finally{ btn.disabled=false; }
};
document.getElementById('navBack').onclick = () => history.back();
document.getElementById('navFwd').onclick = () => history.forward();
document.getElementById('navRefresh').onclick = () => location.reload();

// Show the «Проверка» tab for a logged-in chief agronomist, so the nav is consistent
// across the app's pages (this assistant page itself needs no login).
(async ()=>{
  const s = localStorage.getItem('flagleaf_session') || '';
  if(!s) return;
  try{
    const r = await fetch('/api/me',{headers:{'x-session':s}});
    if(!r.ok) return;
    const me = await r.json();
    if(me.role!=='chief_agronomist' && me.role!=='admin') return;
    const nav = document.querySelector('nav.tabs');
    if(!nav || nav.querySelector('.tab-review')) return;
    const a=document.createElement('a'); a.className='tab tab-review';
    a.href='/app/review.html'; a.textContent='✅ Проверка'; nav.appendChild(a);
    const c = await fetch('/api/review/count',{headers:{'x-session':s}});
    if(c.ok){ const {count}=await c.json(); if(count>0) a.textContent=`✅ Проверка (${count})`; }
  }catch(e){}
})();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/app/sw.js', { updateViaCache: 'none' }).catch(() => {});
  });
}
</script>
