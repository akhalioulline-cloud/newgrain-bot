<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FLAGLEAF — Лента</title>
<meta name="description" content="Общий чат команды агрономов Flagleaf: наблюдения с полей, ответы ИИ-агронома и обсуждение.">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<meta name="apple-mobile-web-app-title" content="Flagleaf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#b9994b">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --gold:#b9994b; --ink:#1a1a1a; --bg:#faf8f4; --card:#fff; --muted:#8a8a8a; --line:#e7e2d8; --ok:#3a7d44; --bad:#c0392b; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:Roboto,-apple-system,Segoe UI,sans-serif;color:var(--ink);background:var(--bg);
       display:flex;flex-direction:column;min-height:100dvh}
  header{background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;padding-top:env(safe-area-inset-top)}
  .hrow{display:flex;align-items:center;gap:10px;padding:12px 16px}
  .navbtns{display:flex;gap:3px;margin-right:2px;flex:none}
  .navb{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:17px;line-height:1;color:var(--ink);cursor:pointer;padding:0}
  .logo{font-family:Oswald;font-weight:600;letter-spacing:.14em;font-size:18px}
  .logo b{color:var(--gold)}
  .sub{font-size:12px;color:var(--muted);margin-left:auto;text-align:right;line-height:1.2}
  .sub .who{color:var(--ink);font-weight:500}
  .logout{color:var(--gold);cursor:pointer;background:none;border:none;font:inherit;padding:0}
  .tabs{display:flex;border-top:1px solid var(--line);overflow-x:auto}
  .tab{flex:1;text-align:center;padding:10px 5px;font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.on{color:var(--ink);border-bottom-color:var(--gold)}

  .fieldbar{display:flex;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto;padding:8px 12px;font-size:13px;color:var(--muted);border-bottom:1px solid var(--line);background:#fff}
  .fieldbar select{font:inherit;font-size:14px;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:7px 10px;background:#fff;flex:1;outline:none}
  #geoNote{font-size:12px;color:#6b6b6b;background:#f1f5ee;border-bottom:1px solid #dde6d5;padding:6px 14px;max-width:760px;margin:0 auto;width:100%}

  main{flex:1;min-height:0;overflow-y:auto;width:100%;max-width:760px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:7px;background-image:url('/app/leafbg.png');background-repeat:repeat}
  .newchip{position:fixed;left:50%;transform:translateX(-50%);bottom:170px;z-index:9;font:inherit;font-size:13px;
           color:#fff;background:var(--gold);border:none;border-radius:16px;padding:8px 16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.22)}
  .daysep{text-align:center;color:var(--muted);font-size:12px;padding:6px 0}

  /* flat wall messages */
  .msg{max-width:86%;border-radius:16px;padding:9px 12px;font-size:14.5px;line-height:1.5;position:relative}
  .msg .mb{white-space:pre-wrap;word-wrap:break-word}
  .msg .mb .mention{color:var(--gold);font-weight:600}
  .theirs{align-self:flex-start;background:#fff;border:1px solid var(--line)}
  .mine{align-self:flex-end;background:var(--ink);color:#fff}
  .mine .mt{color:rgba(255,255,255,.55)}
  .botmsg{align-self:flex-start;background:#faf6ec;border:1px solid #eadfbf;max-width:92%}
  .botmsg .ca{color:#6b541f}
  .mediamsg{align-self:stretch;max-width:100%;background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px 12px}
  .ca{font-weight:500;font-size:12.5px;margin-bottom:3px;color:#8a6d1f}
  .theirs .ca{color:var(--gold)}
  .mt{color:var(--muted);font-size:11px;margin-top:4px;text-align:right}
  .pmedia{width:100%;max-height:340px;object-fit:contain;border-radius:10px;background:#f2eee4;display:block;margin:6px 0}
  .quote{border-left:3px solid var(--gold);padding:2px 8px;margin-bottom:6px;font-size:12.5px;color:var(--muted)}
  .quote .qa{color:var(--gold);font-weight:600;display:block}
  .mine .quote{border-left-color:#d9c17a}
  .mine .quote,.mine .quote .qa{color:rgba(255,255,255,.75)}
  .macts{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
  .pbtn{font:inherit;font-size:12.5px;border:1px solid var(--line);background:#fff;border-radius:14px;padding:4px 10px;cursor:pointer;color:var(--ink);display:flex;align-items:center;gap:4px}
  .pbtn.on.up{border-color:var(--ok);color:var(--ok)}
  .pbtn.on.down{border-color:var(--bad);color:var(--bad)}
  .vbadge{font-size:12px;padding:4px 9px;border-radius:12px;font-weight:500}
  .vbadge.ok{color:var(--ok);background:#eef5e9;border:1px solid #cfe3c2}
  .vbadge.bad{color:var(--bad);background:#fbeceb;border:1px solid #f0cfcd}
  .rbtn{font-size:11.5px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 4px;font-family:inherit}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:24px 12px;line-height:1.5}

  /* composer */
  .att{display:none;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto;padding:6px 12px;font-size:13px;color:var(--muted);border-top:1px solid var(--line);background:#fff}
  .att img{height:40px;border-radius:8px;border:1px solid var(--line)}
  .att .x{cursor:pointer;color:#c0392b;font-weight:700;margin-left:auto}
  .replybar{display:none;align-items:center;gap:8px;max-width:760px;width:100%;margin:0 auto;padding:6px 12px;font-size:12.5px;border-top:1px solid var(--line);background:#fff}
  .replybar .rline{width:3px;align-self:stretch;background:var(--gold);border-radius:2px}
  .replybar .rwho{color:var(--gold);font-weight:600;display:block}
  .replybar .x{cursor:pointer;color:var(--muted);font-weight:700;margin-left:auto}
  form{display:flex;flex-direction:column;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#fff;max-width:760px;width:100%;margin:0 auto}
  .toprow{display:flex;gap:6px;align-items:flex-end}
  textarea{flex:1;resize:none;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font:inherit;font-size:16px;max-height:120px;outline:none}
  textarea:focus{border-color:var(--gold)}
  .btnrow{display:flex;gap:8px}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:12px;height:42px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .btnrow .iconbtn{flex:1}
  .iconbtn.cam{color:var(--gold);border-color:var(--gold)}
  .send{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600;width:52px;flex:none}
  .send:disabled{opacity:.5}
  .iconbtn.rec{background:#c0392b;border-color:#c0392b;color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.55}}
  .hint{font-size:11px;color:var(--muted);text-align:center;padding:6px 16px}
  .hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="navbtns">
      <button class="navb" id="navBack" title="Назад">‹</button>
      <button class="navb" id="navRefresh" title="Обновить">⟳</button>
    </div>
    <span class="logo">FLAG<b>LEAF</b></span>
    <button class="navb hidden" id="inviteBtn" title="Пригласить в команду">👤+</button>
    <span class="sub" id="hdrSub"><span class="who" id="hdrWho"></span></span>
  </div>
  <nav class="tabs" id="tabs">
    <a class="tab on" href="/app/feed.html">👥 Лента</a>
    <a class="tab" href="/app/dms.html">💬 Команда</a>
    <a class="tab" href="/app/assistant.html">🌿 Flagleaf</a>
  </nav>
</header>

<div class="fieldbar">
  <span>Поле:</span>
  <select id="field"></select>
  <select id="crop" class="hidden"></select>
</div>
<div id="geoNote" class="hidden"></div>

<main id="feed"><div class="empty">Загружаю ленту…</div></main>

<div id="inviteModal" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:20;display:flex;align-items:center;justify-content:center;padding:24px">
  <div style="background:#fff;border-radius:18px;padding:20px;max-width:400px;width:100%">
    <div style="font-family:Oswald;font-weight:600;font-size:17px;margin-bottom:12px">Пригласить в команду</div>
    <label style="font-size:13px;color:var(--muted)">Имя и фамилия</label>
    <input id="invName" style="width:100%;font:inherit;font-size:16px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:4px 0 10px">
    <label style="font-size:13px;color:var(--muted)">Почта</label>
    <input id="invEmail" type="email" style="width:100%;font:inherit;font-size:16px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin:4px 0 10px">
    <label style="font-size:13.5px;display:flex;gap:7px;align-items:center;margin:4px 0 14px"><input type="checkbox" id="invChief"> Старший агроном (проверяет наблюдения)</label>
    <div style="display:flex;gap:8px">
      <button id="invSend" style="flex:1;background:var(--gold);border:1px solid var(--gold);color:#fff;font:inherit;font-weight:600;border-radius:12px;padding:10px">Отправить приглашение</button>
      <button id="invCancel" style="border:1px solid var(--line);background:#fff;font:inherit;border-radius:12px;padding:10px 14px">Отмена</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:10px">Коллега войдёт по коду из письма — Telegram не нужен.</div>
  </div>
</div>
<div class="hint">Чат виден всей команде. Фото ИИ разбирает сам; в тексте позовите его — @flagleaf. «↩» на сообщении — ответить.</div>
<div class="replybar" id="replybar"><div class="rline"></div><div style="min-width:0"><span class="rwho" id="rwho"></span><span id="rsnippet"></span></div><span class="x" id="rx">✕</span></div>
<div class="att" id="att"><img id="thumb"><span id="attname"></span><span class="x" id="attx">убрать ✕</span></div>
<form id="form">
  <input type="file" id="cam" accept="image/*" capture="environment" hidden>
  <input type="file" id="gal" accept="image/*,video/*" hidden>
  <div class="toprow">
    <textarea id="q" rows="1" placeholder="Сообщение (@flagleaf — ИИ)"></textarea>
    <button type="submit" class="iconbtn send" id="send" title="Отправить" aria-label="Отправить">➤</button>
  </div>
  <div class="btnrow">
    <button type="button" class="iconbtn cam" id="camBtn" title="Снять фото">📷</button>
    <button type="button" class="iconbtn" id="galBtn" title="Фото или видео">🖼</button>
    <button type="button" class="iconbtn" id="mic" title="Голосовой ввод">🎤</button>
  </div>
</form>

<script>
const TOK='flagleaf_session', $=id=>document.getElementById(id);
let session=localStorage.getItem(TOK)||'', ME=null, fieldsAll=[], msgs=[], topId=0;
let pendingFile=null, pendingURL=null, pendingIsVideo=false, replyTo=null, awaitingBot=false;
const MAX_VIDEO=60*1024*1024;
const CROP_LIST=['Подсолнечник','Соя','Пшеница озимая','Пшеница яровая','Кукуруза','Ячмень','Сахарная свёкла','Горох','Рапс','Гречиха','Овёс','Рожь','Просо','Нут','Лён масличный','Горчица','Кориандр','Многолетние травы'];

async function api(path,opts={}){
  const headers=opts.headers||{}; if(session) headers['x-session']=session;
  const r=await fetch(path,{...opts,headers}); let b=null; try{b=await r.json();}catch(e){}
  if(!r.ok){const err=new Error((b&&b.detail)||('Ошибка '+r.status));err.status=r.status;throw err;} return b;}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function body_html(s){ return esc(s).replace(/(^|\s)(@[^\s@,.:;!?]+)/g,'$1<span class="mention">$2</span>'); }
function when(iso){ if(!iso) return ''; const d=new Date(iso), n=new Date();
  const t=d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  return d.toDateString()===n.toDateString()?t:(d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'})+' '+t); }
function dayLabel(iso){ const d=new Date(iso), n=new Date();
  if(d.toDateString()===n.toDateString()) return 'сегодня';
  const y=new Date(n); y.setDate(n.getDate()-1); if(d.toDateString()===y.toDateString()) return 'вчера';
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'long'}); }
function curField(){const v=$('field').value; return fieldsAll.find(f=>String(f.id)===v)||null;}
function curCrop(){ const f=curField(); return f?(f.crop||''):($('crop').value||''); }
function isChief(){ return ME && (ME.role==='chief_agronomist'||ME.role==='admin'); }
const BOT_MENTION=/(^|\s)@(flagleaf|флаглиф|флаглаф|flag)\b|^\s*(бот|bot)\b/i;

// ---------- wall ----------
async function loadWall(toBottom){
  let data; try{ data=await api('/api/wall'); }catch(e){ if(e.status===401){ location.replace('/app/'); return; } return; }
  ME=data.me; const fresh=data.messages||[];
  if(awaitingBot && fresh.length && fresh[0].is_bot) awaitingBot=false;
  msgs=fresh; topId = msgs.length ? msgs[0].id : 0;
  const nc=$('newChip'); if(nc) nc.remove();
  const el=$('feed'); const prev=el.scrollTop;
  render();
  el.scrollTop = toBottom ? el.scrollHeight : prev;
}
function quoteHtml(m){
  if(!m.reply_to) return '';
  return `<div class="quote"><span class="qa">${esc(m.reply_author||'')}</span>${esc((m.reply_snippet||'').slice(0,80))}</div>`;
}
function msgNode(m){
  const mine = ME && m.author_id===ME.id;
  const div=document.createElement('div');
  const verdict = m.ups ? '<span class="vbadge ok">✓ подтвердил старший</span>'
                : m.downs ? '<span class="vbadge bad">✗ отклонил старший</span>' : '';
  const reactBtns = (isChief() && m.media)
    ? `<button class="pbtn up${m.my_reaction==='up'?' on up':''}" data-v="up">👍</button>`+
      `<button class="pbtn down${m.my_reaction==='down'?' on down':''}" data-v="down">👎</button>` : '';
  const replyBtn = `<button class="rbtn" data-r="1">↩ ответить</button>`;
  if(m.is_bot){
    div.className='msg botmsg';
    div.innerHTML=`<div class="ca">🌿 Flagleaf</div>${quoteHtml(m)}<div class="mb">${body_html(m.body)}</div>`+
      `<div class="mt">${esc(when(m.created_at))}</div><div class="macts">${replyBtn}</div>`;
  } else if(m.media){
    div.className='mediamsg';
    const media = m.is_video
      ? `<video src="${esc(m.media)}" controls playsinline preload="metadata" class="pmedia"></video>`
      : `<img src="${esc(m.media)}" class="pmedia" alt="" onclick="window.open('${esc(m.media)}','_blank')">`;
    div.innerHTML=`<div class="ca">${esc(m.author)}${m.field?' · 📍 '+esc(m.field):''}</div>${quoteHtml(m)}${media}`+
      (m.body?`<div class="mb">${body_html(m.body)}</div>`:'')+
      `<div class="macts">${reactBtns}${verdict}${replyBtn}<span class="mt" style="margin-left:auto">${esc(when(m.created_at))}</span></div>`;
  } else {
    div.className='msg '+(mine?'mine':'theirs');
    div.innerHTML=(mine?'':`<div class="ca">${esc(m.author)}${m.chief?' · старший':''}</div>`)+quoteHtml(m)+
      `<div class="mb">${body_html(m.body)}</div><div class="mt">${esc(when(m.created_at))}</div>`+
      `<div class="macts">${replyBtn}</div>`;
  }
  div.querySelectorAll('.pbtn[data-v]').forEach(b=>b.onclick=()=>reactMsg(m.id,b.dataset.v,b));
  div.querySelector('[data-r]').onclick=()=>setReply(m);
  return div;
}
function render(){
  const el=$('feed');
  if(!msgs.length){ el.innerHTML='<div class="empty">Пока пусто. Пришлите фото/видео с поля или напишите наблюдение — увидит вся команда. «@flagleaf» — спросить ИИ.</div>'; return; }
  el.innerHTML='';
  let prevDay='';
  [...msgs].reverse().forEach(m=>{
    const lbl=dayLabel(m.created_at);
    if(lbl!==prevDay){ const s=document.createElement('div'); s.className='daysep'; s.textContent=lbl; el.appendChild(s); prevDay=lbl; }
    el.appendChild(msgNode(m));
  });
  if(awaitingBot){ const t=document.createElement('div'); t.className='msg botmsg'; t.id='typing';
    t.innerHTML='<div class="ca">🌿 Flagleaf</div><div class="mb" style="color:var(--muted)">смотрит и отвечает…</div>'; el.appendChild(t); }
}
async function reactMsg(id, verdict, btn){
  const on=btn.classList.contains('on');
  try{ await api(`/api/wall/${id}/react`,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({verdict:on?'none':verdict})}); }catch(e){ return; }
  loadWall();
}
function setReply(m){
  replyTo={id:m.id, author:m.is_bot?'Flagleaf':m.author, snippet:(m.body||(m.media?'📷 фото':'')).slice(0,80), bot:!!m.is_bot};
  $('rwho').textContent=replyTo.author; $('rsnippet').textContent=replyTo.snippet;
  $('replybar').style.display='flex'; $('q').focus();
}
function clearReply(){ replyTo=null; $('replybar').style.display='none'; }
$('rx').onclick=clearReply;

// ---------- compose ----------
function setFile(f){ pendingFile=f; pendingIsVideo=!!(f&&(f.type||'').startsWith('video'));
  if(pendingURL){URL.revokeObjectURL(pendingURL);pendingURL=null;}
  if(f){ pendingURL=URL.createObjectURL(f);
    if(pendingIsVideo){ $('thumb').style.display='none'; $('attname').textContent='🎬 Видео готово'; }
    else { $('thumb').style.display=''; $('thumb').src=pendingURL; $('attname').textContent='Фото готово'; }
    $('att').style.display='flex'; }
  else { $('att').style.display='none'; $('cam').value=''; $('gal').value=''; pendingIsVideo=false; } }
$('camBtn').onclick=()=>$('cam').click();
$('galBtn').onclick=()=>$('gal').click();
$('cam').onchange=e=>{ const f=e.target.files[0]; if(f) setFile(f); e.target.value=''; };
$('gal').onchange=e=>{ const f=e.target.files[0]; if(f) setFile(f); e.target.value=''; };
$('attx').onclick=()=>setFile(null);
$('q').addEventListener('input', ()=>{ $('q').style.height='auto'; $('q').style.height=Math.min($('q').scrollHeight,120)+'px'; });

async function sendMsg(){
  const text=$('q').value.trim(), file=pendingFile, crop=curCrop(), f=curField();
  if(!text && !file) return;
  if(file && pendingIsVideo && file.size>MAX_VIDEO){ alert('Видео до ~60 МБ / 15 сек. Снимите покороче.'); return; }
  $('send').disabled=true;
  const fd=new FormData(); fd.append('body',text); if(f) fd.append('field_id',String(f.id)); if(crop) fd.append('crop',crop);
  if(replyTo) fd.append('reply_to',String(replyTo.id));
  if(file) fd.append(pendingIsVideo?'video':'image', file);
  const botExpected = !!file || BOT_MENTION.test(text) || !!(replyTo&&replyTo.bot);
  $('q').value=''; $('q').style.height='auto'; setFile(null); clearReply();
  try{
    await api('/api/wall',{method:'POST',body:fd});
    if(botExpected){ awaitingBot=true; setTimeout(()=>{ awaitingBot=false; }, 90000); }
    await loadWall(true);
  }
  catch(e){ alert(e.status===429?'Слишком много сообщений — попробуйте позже.':(e.message||'Не удалось отправить.')); }
  finally{ $('send').disabled=false; }
}
$('form').addEventListener('submit', e=>{ e.preventDefault(); sendMsg(); });
$('q').addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); } });

// ---------- voice ----------
const micBtn=$('mic'); let recording=false, actx=null, mstream=null, mproc=null, mchunks=[];
micBtn.onclick=async()=>{ if(recording){ stopRec(); return; }
  try{ mstream=await navigator.mediaDevices.getUserMedia({audio:true}); }catch(e){ alert('Нет доступа к микрофону.'); return; }
  actx=new (window.AudioContext||window.webkitAudioContext)(); const src=actx.createMediaStreamSource(mstream);
  mproc=actx.createScriptProcessor(4096,1,1); mchunks=[]; mproc.onaudioprocess=e=>mchunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
  src.connect(mproc); mproc.connect(actx.destination); recording=true; micBtn.classList.add('rec'); micBtn.textContent='⏹'; };
function stopRec(){ recording=false; micBtn.classList.remove('rec'); micBtn.textContent='🎤';
  try{mproc.disconnect();}catch(e){} if(mstream) mstream.getTracks().forEach(t=>t.stop());
  const inRate=actx.sampleRate; let len=mchunks.reduce((a,c)=>a+c.length,0); const buf=new Float32Array(len); let off=0;
  for(const c of mchunks){buf.set(c,off);off+=c.length;} try{actx.close();}catch(e){} if(len<inRate*0.3) return;
  const ratio=inRate/16000, outLen=Math.floor(buf.length/ratio), out=new Int16Array(outLen);
  for(let i=0;i<outLen;i++){const s=Math.max(-1,Math.min(1,buf[Math.floor(i*ratio)]||0));out[i]=s<0?s*0x8000:s*0x7FFF;}
  fetch('/api/transcribe',{method:'POST',headers:{'Content-Type':'application/octet-stream'},body:out.buffer})
    .then(r=>r.json()).then(j=>{ if(j.text){ const q=$('q'); q.value=(q.value?q.value+' ':'')+j.text; q.dispatchEvent(new Event('input')); q.focus(); } }).catch(()=>{}); }

// ---------- fields + geo ----------
function selectField(id){ const o=[...$('field').options].find(x=>x.value===String(id)); if(o){ $('field').value=String(id); $('field').dispatchEvent(new Event('change')); } }
async function geoLocate(){
  if(!navigator.geolocation) return;
  const pos=await new Promise(res=>navigator.geolocation.getCurrentPosition(p=>res(p),()=>res(null),{enableHighAccuracy:true,timeout:8000,maximumAge:60000}));
  if(!pos) return; let f=null;
  try{ f=(await api('/api/field-at-point',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lat:pos.coords.latitude,lon:pos.coords.longitude})})).field; }catch(_){ return; }
  if(!f) return;
  if(!fieldsAll.some(x=>String(x.id)===String(f.id))){ fieldsAll.push({id:f.id,name:f.name,crop:f.crop||''});
    const o=document.createElement('option'); o.value=String(f.id); o.textContent=f.name; $('field').appendChild(o); }
  selectField(f.id); const g=$('geoNote'); g.textContent=`📍 Поле «${f.name}» определено по GPS — измените, если не так.`; g.classList.remove('hidden');
}

// ---------- polling (faster while the bot is thinking) ----------
async function poll(){
  try{ const d=await api('/api/wall'); const nt=(d.messages&&d.messages[0]&&d.messages[0].id)||0;
    if(nt>topId || awaitingBot){
      const el=$('feed'); const nearBottom=(el.scrollHeight-el.scrollTop-el.clientHeight)<160;
      if(awaitingBot && d.messages.length && d.messages[0].is_bot){ awaitingBot=false; loadWall(true); return; }
      if(nt>topId){ if(nearBottom) loadWall(true); else showNewChip(); }
    }
  }catch(e){}
}
function showNewChip(){ if($('newChip')) return; const chip=document.createElement('button'); chip.id='newChip'; chip.className='newchip';
  chip.textContent='↓ новые сообщения'; chip.onclick=()=>{ chip.remove(); loadWall(true); }; document.body.appendChild(chip); }

// ---------- boot ----------
$('navBack').onclick=()=>window.history.back();
$('navRefresh').onclick=()=>loadWall(true);
async function boot(){
  if(!session){ location.replace('/app/'); return; }
  let me=null; try{ me=await api('/api/me'); }catch(e){}
  if(!me){ localStorage.removeItem(TOK); location.replace('/app/'); return; }
  ME=me; $('hdrWho').textContent=me.name||'';
  $('hdrSub').insertAdjacentHTML('beforeend',' · <button class="logout" id="lo">выйти</button>');
  $('lo').onclick=()=>{ localStorage.removeItem(TOK); location.replace('/app/'); };
  try{ const r=await api('/api/fields'); fieldsAll=r.fields||[];
    $('field').innerHTML=fieldsAll.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join('')+'<option value="">— другое поле —</option>';
    const merged=[...new Set(fieldsAll.map(f=>f.crop).filter(Boolean))], seen=new Set(merged.map(c=>c.toLowerCase()));
    for(const c of CROP_LIST){ if(!seen.has(c.toLowerCase())){ merged.push(c); seen.add(c.toLowerCase()); } }
    $('crop').innerHTML='<option value="">— культура —</option>'+merged.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
    $('field').value='';
    const toggleCrop=()=>$('crop').classList.toggle('hidden',$('field').value!=='');
    toggleCrop();
    $('field').onchange=()=>{ toggleCrop(); $('geoNote').classList.add('hidden'); };
  }catch(e){}
  geoLocate();
  if(isChief()){
    const ib=$('inviteBtn'); ib.classList.remove('hidden');
    ib.onclick=()=>$('inviteModal').classList.remove('hidden');
    $('invCancel').onclick=()=>$('inviteModal').classList.add('hidden');
    $('invSend').onclick=async()=>{
      const name=$('invName').value.trim(), email=$('invEmail').value.trim();
      if(name.length<2||!email.includes('@')){ alert('Заполните имя и почту.'); return; }
      $('invSend').disabled=true;
      try{
        const r=await api('/api/invite',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({name,email,role:$('invChief').checked?'chief_agronomist':'agronomist'})});
        alert(r.email_sent?('Приглашение отправлено на '+email.toLowerCase()+'.')
                          :'Аккаунт создан, но письмо не ушло — передайте коллеге: вход по этой почте.');
        $('invName').value=''; $('invEmail').value=''; $('invChief').checked=false;
        $('inviteModal').classList.add('hidden');
      }catch(e){ alert(e.message||'Не получилось.'); }
      finally{ $('invSend').disabled=false; }
    };
  }
  await loadWall(true);
  setInterval(()=>{ poll(); }, 8000);
  document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') poll(); });
}
boot();
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('/app/sw.js', { updateViaCache: 'none' }).catch(() => {}); });
}
