# nginx vhost for ai.flagleaf.ru — the AI agronomist web (Phase 1 + Phase 2).
# Serves two static screens from /var/www/ai and proxies /api/ to the FastAPI
# `api` container (127.0.0.1:8000) on the same VM. Coexists with the flagleaf.ru
# vhost and the Docker stack — touches neither.
#
#   /        → public AI-chat demo        (web/ai/index.html  → /var/www/ai/index.html)
#   /app/    → agronomist photo upload    (web/app/index.html → /var/www/ai/app/index.html)
#
# Install (on the VM):
#   sudo cp deploy/ai-flagleaf.conf /etc/nginx/sites-available/ai-flagleaf
#   sudo ln -sf /etc/nginx/sites-available/ai-flagleaf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ai.flagleaf.ru   # adds the 443 listener + cert + redirect
# After certbot, the LIVE file gains ssl_* lines (certbot-managed); this repo copy
# stays the pre-TLS template.
#
# Deploy the static files (both screens live under the same root):
#   sudo mkdir -p /var/www/ai/app
#   sudo cp web/ai/*  /var/www/ai/          # chat page + icons (favicon, apple-touch, icon-512)
#   sudo cp web/app/index.html /var/www/ai/app/
# The upload page references icons by absolute path (/favicon.png, …), which resolve
# against this same root — no need to duplicate them into /app.
server {
    listen 80;
    listen [::]:80;
    server_name ai.flagleaf.ru;

    root /var/www/ai;
    index index.html;
    client_max_body_size 15M;        # default cap (chat + single diagnosis photo)

    # Bulk photo upload for labeling (Phase 2) — many originals per request.
    # Backend caps each photo at 25 MB and takes up to 40, so allow a big body
    # here only; everything else stays at the 15M server limit above.
    location /api/submit {
        client_max_body_size 1024M;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;     # stream the upload through, don't buffer to disk first
        proxy_read_timeout 600s;         # 40 photos → S3 can take a while
        proxy_send_timeout 600s;
        client_body_timeout 600s;
    }

    # Scouting video upload (Pilot v2) — large body, streamed, like /api/submit.
    location /api/scout-video {
        client_max_body_size 512M;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_body_timeout 600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;     # diagnosis (vision + LLM) can take ~30–60s
        proxy_send_timeout 180s;
    }

    # Agronomist upload screen (gated by login). Served from /var/www/ai/app/.
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
