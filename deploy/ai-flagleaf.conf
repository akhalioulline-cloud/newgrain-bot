# nginx vhost for ai.flagleaf.ru — the AI agronomist web demo (Phase 1).
# Serves the static chat UI (/var/www/ai) and proxies /api/ to the FastAPI `api`
# container (127.0.0.1:8000) on the same VM. Coexists with the flagleaf.ru vhost
# and the Docker stack — touches neither.
#
# Install (on the VM):
#   sudo cp deploy/ai-flagleaf.conf /etc/nginx/sites-available/ai-flagleaf
#   sudo ln -sf /etc/nginx/sites-available/ai-flagleaf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d ai.flagleaf.ru   # adds the 443 listener + cert + redirect
# After certbot, the LIVE file gains ssl_* lines (certbot-managed); this repo copy
# stays the pre-TLS template.
server {
    listen 80;
    listen [::]:80;
    server_name ai.flagleaf.ru;

    root /var/www/ai;
    index index.html;
    client_max_body_size 15M;        # photo uploads

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;     # diagnosis (vision + LLM) can take ~30–60s
        proxy_send_timeout 180s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
